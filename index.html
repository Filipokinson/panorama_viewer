<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Галерея панорам</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
        }
        body {
            overflow: hidden;
            background: #000;
            cursor: grab;
            touch-action: none;
            font-family: Arial, sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }
        body.dragging {
            cursor: grabbing;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        button:focus-visible,
        .panorama-item:focus-visible {
            outline: 2px solid #ffffff;
            outline-offset: 3px;
        }

        #sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 300px;
            height: 100vh;
            background: rgba(30, 30, 30, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            overflow-y: auto;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.5);
        }

        #sidebar.open {
            transform: translateX(0);
        }

        #sidebar-content {
            padding: 20px;
        }

        .sidebar-header {
            color: #e0e0e0;
            font-size: 1.5em;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .close-btn {
            background: none;
            border: none;
            color: #e0e0e0;
            font-size: 1.5em;
            cursor: pointer;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.3s ease;
        }

        .close-btn:hover {
            color: #ffffff;
        }

        .panorama-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .panorama-item {
            background: rgba(60, 60, 60, 0.3);
            border: 2px solid rgba(100, 100, 100, 0.5);
            border-radius: 8px;
            padding: 0;
            cursor: pointer;
            transition: all 0.3s ease;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 0;
            width: 100%;
            text-align: left;
            font: inherit;
        }

        .panorama-item:hover {
            background: rgba(80, 80, 80, 0.4);
            border-color: rgba(150, 150, 150, 0.8);
            transform: translateX(5px);
            box-shadow: 0 5px 20px rgba(100, 100, 100, 0.2);
        }

        .panorama-item.active {
            background: rgba(120, 120, 120, 0.6);
            border-color: rgba(180, 180, 180, 1);
            box-shadow: 0 0 20px rgba(150, 150, 150, 0.3);
        }

        .panorama-thumbnail {
            width: 100%;
            height: 150px;
            object-fit: cover;
            display: block;
            background: #2a2a2a;
            opacity: 0.85;
        }

        .panorama-item:hover .panorama-thumbnail {
            opacity: 1;
        }

        .panorama-info {
            padding: 15px;
            background: rgba(0, 0, 0, 0.4);
        }

        .panorama-title {
            font-weight: bold;
            font-size: 1.1em;
            color: #e0e0e0;
            margin-bottom: 5px;
        }

        .panorama-desc {
            font-size: 0.85em;
            opacity: 0.7;
            color: #b0b0b0;
        }

        #menu-button {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 999;
        }

        .circle-btn {
            background: rgba(80, 80, 80, 0.8);
            color: #e0e0e0;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.4em;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }

        .circle-btn:hover {
            background: rgba(120, 120, 120, 1);
            color: #ffffff;
            transform: scale(1.1);
        }

        #bottom-controls {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 900;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        #top-badge {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translate(-50%, -8px);
            background: rgba(20, 20, 20, 0.75);
            backdrop-filter: blur(6px);
            color: #e6e6e6;
            padding: 10px 20px;
            border-radius: 999px;
            font-size: 0.9em;
            display: flex;
            gap: 10px;
            align-items: baseline;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.25s ease, transform 0.25s ease;
            z-index: 400;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            max-width: min(70vw, 480px);
        }

        #top-badge.visible {
            opacity: 1;
            transform: translate(-50%, 0);
        }

        #top-badge-name {
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #top-badge-room {
            opacity: 0.6;
            font-size: 0.85em;
            white-space: nowrap;
        }

        #info-panel {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: transparent;
            border: 1px solid transparent;
            border-radius: 8px;
            z-index: 100;
            max-width: 300px;
            overflow: hidden;
            box-shadow: 0 4px 15px transparent;
            display: none;
        }

        #info-image {
            width: 100%;
            height: 200px;
            object-fit: contain;
            display: block;
            background: transparent;
        }

        #loading-overlay,
        #error-overlay {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
            background: rgba(0, 0, 0, 0.55);
            z-index: 500;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
            color: #e0e0e0;
            font-size: 0.95em;
            text-align: center;
            padding: 20px;
        }

        #loading-overlay.visible,
        #error-overlay.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .spinner {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.15);
            border-top-color: rgba(220, 220, 220, 0.9);
            animation: spin 0.9s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #error-overlay button {
            background: rgba(90, 90, 90, 0.9);
            color: #f0f0f0;
            border: none;
            padding: 10px 22px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95em;
            transition: background 0.2s ease;
        }

        #error-overlay button:hover {
            background: rgba(130, 130, 130, 1);
        }

        #hotspot-layer {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 300;
        }

        .hotspot-marker {
            position: absolute;
            top: 0;
            left: 0;
            width: 28px;
            height: 28px;
            margin-left: -14px;
            margin-top: -14px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.85);
            border: 2px solid rgba(255, 255, 255, 0.95);
            color: #222;
            font-size: 0.8em;
            font-weight: bold;
            font-style: italic;
            font-family: Georgia, serif;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            pointer-events: auto;
            transition: transform 0.15s ease, opacity 0.15s ease, background 0.15s ease;
            animation: hotspot-pulse 2.4s ease-out infinite;
        }

        .hotspot-marker.hidden {
            display: none;
        }

        .hotspot-marker:hover,
        .hotspot-marker.active {
            transform: scale(1.15);
            background: #ffffff;
        }

        @keyframes hotspot-pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.5); }
            70% { box-shadow: 0 0 0 14px rgba(255, 255, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
        }

        .hotspot-tooltip {
            position: absolute;
            top: 0;
            left: 0;
            max-width: 260px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(6px);
            color: #222222;
            padding: 12px 14px;
            border-radius: 8px;
            font-size: 0.85em;
            font-weight: normal;
            line-height: 1.45;
            pointer-events: none;
            opacity: 0;
            transform: translateY(4px);
            transition: opacity 0.15s ease, transform 0.15s ease;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.35);
            z-index: 301;
        }

        .hotspot-tooltip.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .hotspot-tooltip-title {
            font-weight: bold;
            margin-bottom: 4px;
            color: #111111;
        }

        #calibrate-btn {
            display: none;
        }

        #calibrate-btn.active {
            background: rgba(217, 119, 87, 0.9);
            color: #fff;
        }

        #calibration-panel {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 15, 15, 0.92);
            color: #8cff8c;
            font-family: Consolas, Menlo, monospace;
            font-size: 0.8em;
            padding: 10px 16px;
            border-radius: 8px;
            z-index: 950;
            display: none;
            text-align: center;
            white-space: pre-line;
            max-width: 90vw;
            pointer-events: none;
        }

        #calibration-panel.visible {
            display: block;
        }

        @media (max-width: 768px) {
            #sidebar {
                width: 80vw;
            }

            .panorama-thumbnail {
                height: 120px;
            }

            .panorama-info {
                padding: 12px;
            }

            .panorama-title {
                font-size: 1em;
            }

            .panorama-desc {
                font-size: 0.8em;
            }

            #info-panel {
                max-width: 250px;
            }

            #info-image {
                height: 150px;
            }

            #top-badge {
                font-size: 0.8em;
                padding: 8px 14px;
            }

            #bottom-controls {
                bottom: 16px;
                left: 16px;
            }

            .circle-btn {
                width: 44px;
                height: 44px;
                font-size: 1.2em;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            #sidebar,
            .panorama-item,
            .circle-btn,
            #top-badge,
            #loading-overlay,
            #error-overlay {
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <button id="menu-button" class="circle-btn" aria-label="Открыть список панорам" aria-expanded="false" aria-controls="sidebar">☰</button>

    <div id="top-badge" aria-hidden="true">
        <span id="top-badge-name"></span>
        <span id="top-badge-room"></span>
    </div>

    <div id="bottom-controls">
        <button id="reset-view-btn" class="circle-btn" aria-label="Сбросить вид" title="Сбросить вид (двойной клик по панораме)">⟲</button>
        <button id="fullscreen-btn" class="circle-btn" aria-label="Полноэкранный режим" title="Полноэкранный режим">⛶</button>
        <button id="calibrate-btn" class="circle-btn" aria-label="Режим калибровки меток" title="Режим калибровки меток">🎯</button>
    </div>

    <div id="hotspot-layer"></div>

    <div id="calibration-panel"></div>

    <div id="sidebar" aria-hidden="true">
        <div id="sidebar-content">
            <div class="sidebar-header">
                Панорамы
                <button class="close-btn" id="close-sidebar" aria-label="Закрыть меню">✕</button>
            </div>
            <div class="panorama-list" id="panorama-list"></div>
        </div>
    </div>

    <div id="info-panel">
        <img id="info-image" src="" alt="">
    </div>

    <div id="loading-overlay">
        <div class="spinner" role="presentation"></div>
        <span>Загрузка панорамы…</span>
    </div>

    <div id="error-overlay">
        <span>Не удалось загрузить панораму.</span>
        <button id="error-retry">Повторить попытку</button>
    </div>

    <div id="sr-status" class="sr-only" role="status" aria-live="polite"></div>

    <script async src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // Формат точки на стене (hotspot):
        //   yaw   — угол по горизонтали в градусах (0 = направление камеры по умолчанию)
        //   pitch — угол по вертикали в градусах (0 = уровень горизонта, + вверх, - вниз)
        //   title, text — заголовок и текст сноски
        // Точные yaw/pitch удобнее всего получить через режим калибровки:
        // откройте страницу с ?calibrate=1 в адресной строке, нажмите на кнопку 🎯
        // и кликните прямо на нужный объект в панораме — координаты появятся внизу
        // экрана и скопируются в буфер обмена.
        const panoramas = [
            {
                id: 'office',
                name: 'Офисное помещение',
                desc: '',
                image: './images/office.png',
                thumbnail: './images/office_thumb.png',
                infoImage: '',
                hotspots: [
                { yaw: 163.9, pitch: -0.1, title: 'Логотип ЦЕА', text: 'Крупный объемный логотип выполнен в цвет стен, благодаря чему органично интегрируется в интерьер и становится частью архитектурной композиции. В сочетании с акцентным фиолетовым потолком он формирует выразительную композицию пространства и подчеркивает фирменный стиль школы без избыточной визуальной нагрузки.' }
                ]
            },
            {
                id: 'class',
                name: 'Учебный кабинет, посвященный АСЕАН',
                desc: '',
                image: './images/class.png',
                thumbnail: './images/class_thumb.png',
                infoImage: '',
                hotspots: [
                { yaw: -65.6, pitch: -0.1, title: 'Карта стран-участниц АСЕАН', text: 'Карта - центральный образовательный элемент кабинета, посвященного странам АСЕАН, и выполняет наглядную учебную функцию. Учащиеся визуально запоминают состав региона, расположение стран и хронологию расширения организации без обращения к учебнику или презентации. Карта задает визуальную идентичность кабинета, сразу считывается его специализация и профиль обучения.' },
                { yaw: 99.8, pitch: 3.0, title: 'Акустические панели', text: 'Панели обеспечивают акустический комфорт в учебных классах, снижая распространение шума и улучшая качество восприятия речи. Это особенно важно для занятий с аудированием, видеоуроками и устной практикой.' }
                ]
            }
        ];

        let currentPanoramaId = panoramas[0].id;
        let currentPano = null;
        let renderer, scene, camera, mesh;
        let rafId = null;
        let loadToken = 0;

        // --- DOM references ---
        const sidebar = document.getElementById('sidebar');
        const menuButton = document.getElementById('menu-button');
        const closeBtn = document.getElementById('close-sidebar');
        const panoramaList = document.getElementById('panorama-list');
        const infoPanel = document.getElementById('info-panel');
        const infoImage = document.getElementById('info-image');
        const loadingOverlay = document.getElementById('loading-overlay');
        const errorOverlay = document.getElementById('error-overlay');
        const errorRetryBtn = document.getElementById('error-retry');
        const topBadge = document.getElementById('top-badge');
        const topBadgeName = document.getElementById('top-badge-name');
        const topBadgeRoom = document.getElementById('top-badge-room');
        const resetViewBtn = document.getElementById('reset-view-btn');
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        const srStatus = document.getElementById('sr-status');
        const hotspotLayer = document.getElementById('hotspot-layer');
        const calibrateBtn = document.getElementById('calibrate-btn');
        const calibrationPanel = document.getElementById('calibration-panel');

        // --- Sidebar open/close ---
        function openSidebar() {
            sidebar.classList.add('open');
            sidebar.setAttribute('aria-hidden', 'false');
            menuButton.setAttribute('aria-expanded', 'true');
            const activeItem = panoramaList.querySelector('.panorama-item.active');
            if (activeItem) activeItem.scrollIntoView({ block: 'nearest' });
        }

        function closeSidebar() {
            sidebar.classList.remove('open');
            sidebar.setAttribute('aria-hidden', 'true');
            menuButton.setAttribute('aria-expanded', 'false');
        }

        menuButton.addEventListener('click', () => {
            if (sidebar.classList.contains('open')) closeSidebar();
            else openSidebar();
        });

        closeBtn.addEventListener('click', closeSidebar);

        document.addEventListener('click', (e) => {
            if (sidebar.classList.contains('open') && !sidebar.contains(e.target) && !menuButton.contains(e.target)) {
                closeSidebar();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && sidebar.classList.contains('open')) {
                closeSidebar();
            }
        });

        // --- Build sidebar list ---
        panoramas.forEach((pano) => {
            const item = document.createElement('button');
            item.className = 'panorama-item';
            item.type = 'button';
            item.dataset.id = pano.id;
            if (pano.id === currentPanoramaId) {
                item.classList.add('active');
                item.setAttribute('aria-current', 'true');
            }
            item.innerHTML = `
                <img src="${pano.thumbnail}" alt="" loading="lazy" class="panorama-thumbnail">
                <div class="panorama-info">
                    <div class="panorama-title">${pano.name}</div>
                    <div class="panorama-desc">Кабинет ${pano.desc}</div>
                </div>
            `;
            item.addEventListener('click', () => {
                goToPanorama(pano.id);
                closeSidebar();
            });
            panoramaList.appendChild(item);
        });

        function goToPanorama(id) {
            const pano = panoramas.find(p => p.id === id);
            if (!pano) return;

            currentPanoramaId = id;
            currentPano = pano;

            document.querySelectorAll('.panorama-item').forEach((item) => {
                const isActive = item.dataset.id === id;
                item.classList.toggle('active', isActive);
                if (isActive) item.setAttribute('aria-current', 'true');
                else item.removeAttribute('aria-current');
            });

            document.title = `${pano.name} — Галерея панорам`;
            updateInfoPanel(pano);
            updateTopBadge(pano);
            buildHotspotMarkers(pano);
            loadPanorama(pano.image);
        }

        // --- Точки на стенах (hotspots) ---
        let hotspotMarkers = [];

        function yawPitchToDirection(yawDeg, pitchDeg) {
            const yaw = THREE.MathUtils.degToRad(yawDeg);
            const pitch = THREE.MathUtils.degToRad(pitchDeg);
            return new THREE.Vector3(
                -Math.sin(yaw) * Math.cos(pitch),
                Math.sin(pitch),
                -Math.cos(yaw) * Math.cos(pitch)
            );
        }

        function directionToYawPitch(dir) {
            const d = dir.clone().normalize();
            const pitch = Math.asin(Math.max(-1, Math.min(1, d.y)));
            const yaw = Math.atan2(-d.x, -d.z);
            return {
                yaw: THREE.MathUtils.radToDeg(yaw),
                pitch: THREE.MathUtils.radToDeg(pitch)
            };
        }

        function clearHotspotMarkers() {
            hotspotMarkers.forEach((h) => {
                h.el.remove();
                h.tooltipEl.remove();
            });
            hotspotMarkers = [];
        }

        function buildHotspotMarkers(pano) {
            clearHotspotMarkers();
            (pano.hotspots || []).forEach((h) => {
                const marker = document.createElement('button');
                marker.type = 'button';
                marker.className = 'hotspot-marker hidden';
                marker.textContent = 'i';
                marker.setAttribute('aria-label', h.title || 'Подробнее');

                const tooltip = document.createElement('div');
                tooltip.className = 'hotspot-tooltip';
                const titleEl = document.createElement('div');
                titleEl.className = 'hotspot-tooltip-title';
                titleEl.textContent = h.title || '';
                const textEl = document.createElement('div');
                textEl.textContent = h.text || '';
                tooltip.appendChild(titleEl);
                tooltip.appendChild(textEl);

                function show() {
                    tooltip.classList.add('visible');
                    marker.classList.add('active');
                }
                function hide() {
                    tooltip.classList.remove('visible');
                    marker.classList.remove('active');
                }

                marker.addEventListener('mouseenter', show);
                marker.addEventListener('mouseleave', hide);
                marker.addEventListener('focus', show);
                marker.addEventListener('blur', hide);
                marker.addEventListener('click', (e) => {
                    e.stopPropagation();
                    tooltip.classList.contains('visible') ? hide() : show();
                });

                hotspotLayer.appendChild(marker);
                hotspotLayer.appendChild(tooltip);

                hotspotMarkers.push({
                    el: marker,
                    tooltipEl: tooltip,
                    dir: yawPitchToDirection(h.yaw, h.pitch)
                });
            });
        }

        // Клик в любом другом месте закрывает открытые сноски
        document.addEventListener('click', () => {
            hotspotMarkers.forEach((h) => {
                h.tooltipEl.classList.remove('visible');
                h.el.classList.remove('active');
            });
        });

        function updateInfoPanel(pano) {
            if (pano.infoImage) {
                infoImage.src = pano.infoImage;
                infoImage.alt = `Информация: ${pano.name}`;
                infoPanel.style.display = 'block';
            } else {
                infoImage.src = '';
                infoPanel.style.display = 'none';
            }
        }

        function updateTopBadge(pano) {
            topBadge.classList.remove('visible');
            window.setTimeout(() => {
                topBadgeName.textContent = pano.name;
                topBadgeRoom.textContent = pano.desc ? `каб. ${pano.desc}` : '';
                topBadge.classList.add('visible');
            }, 150);
        }

        // --- Loading / error UI ---
        function showLoading(show) {
            loadingOverlay.classList.toggle('visible', show);
        }

        function showError(show) {
            errorOverlay.classList.toggle('visible', show);
        }

        errorRetryBtn.addEventListener('click', () => {
            if (currentPano) loadPanorama(currentPano.image);
        });

        // --- Three.js setup ---
        function initThreeJS() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(
                75,
                window.innerWidth / window.innerHeight,
                0.1,
                10000
            );
            camera.rotation.order = 'YXZ';

            renderer = new THREE.WebGLRenderer({
                antialias: true,
                alpha: true,
                precision: 'highp'
            });
            renderer.outputEncoding = THREE.sRGBEncoding;
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
            document.body.appendChild(renderer.domElement);

            renderer.domElement.addEventListener('webglcontextlost', (e) => {
                e.preventDefault();
                if (rafId) cancelAnimationFrame(rafId);
                showError(true);
            }, false);

            renderer.domElement.addEventListener('webglcontextrestored', () => {
                showError(false);
                if (currentPano) loadPanorama(currentPano.image);
                animate();
            }, false);

            goToPanorama(currentPanoramaId);

            let isDown = false;
            let previousPosition = { x: 0, y: 0 };
            let velocity = { x: 0, y: 0 };
            const friction = 0.95;
            const sensitivity = 0.002;
            const minFOV = 20;
            const maxFOV = 100;
            const zoomSensitivity = 3;
            const defaultFOV = 75;

            // Автопрокрутка
            let autoScrollTimeout;
            let isAutoScrolling = false;
            const autoScrollDelay = 5000; // 5 секунд без взаимодействия
            const autoScrollSpeed = 0.0005;

            function startAutoScrollTimer() {
                clearTimeout(autoScrollTimeout);
                isAutoScrolling = false;
                autoScrollTimeout = setTimeout(() => {
                    isAutoScrolling = true;
                }, autoScrollDelay);
            }

            function resetAutoScroll() {
                startAutoScrollTimer();
            }

            function isInteractiveTarget(target) {
                return target.closest('#sidebar, #menu-button, #bottom-controls, #info-panel, #top-badge, #error-overlay, #hotspot-layer, #calibration-panel');
            }

            // Плавный сброс угла обзора и зума
            function resetView() {
                const twoPi = Math.PI * 2;
                const startX = camera.rotation.x;
                const startY = camera.rotation.y;
                const targetY = Math.round(startY / twoPi) * twoPi;
                const startFov = camera.fov;
                const duration = 450;
                const startTime = performance.now();
                velocity = { x: 0, y: 0 };

                function step(now) {
                    const t = Math.min((now - startTime) / duration, 1);
                    const ease = 1 - Math.pow(1 - t, 3);
                    camera.rotation.x = startX * (1 - ease);
                    camera.rotation.y = startY + (targetY - startY) * ease;
                    camera.fov = startFov + (defaultFOV - startFov) * ease;
                    camera.updateProjectionMatrix();
                    if (t < 1) {
                        requestAnimationFrame(step);
                    } else {
                        resetAutoScroll();
                    }
                }
                requestAnimationFrame(step);
            }
            resetViewBtn.addEventListener('click', resetView);

            document.addEventListener('dblclick', (e) => {
                if (!isInteractiveTarget(e.target)) resetView();
            });

            // --- Режим калибровки меток (только по ?calibrate=1 в адресной строке) ---
            const calibrationAvailable = new URLSearchParams(window.location.search).has('calibrate');
            let calibrationMode = false;
            const raycaster = new THREE.Raycaster();
            const mouseVec = new THREE.Vector2();

            if (calibrationAvailable) {
                calibrateBtn.style.display = 'flex';
                calibrateBtn.addEventListener('click', () => {
                    calibrationMode = !calibrationMode;
                    calibrateBtn.classList.toggle('active', calibrationMode);
                    calibrationPanel.classList.toggle('visible', calibrationMode);
                    calibrationPanel.textContent = calibrationMode
                        ? 'Режим калибровки включён.\nКликните точно (без перетаскивания) по нужной точке на панораме.'
                        : '';
                });

                document.addEventListener('click', (e) => {
                    if (!calibrationMode || isInteractiveTarget(e.target)) return;
                    mouseVec.x = (e.clientX / window.innerWidth) * 2 - 1;
                    mouseVec.y = -(e.clientY / window.innerHeight) * 2 + 1;
                    raycaster.setFromCamera(mouseVec, camera);
                    const { yaw, pitch } = directionToYawPitch(raycaster.ray.direction);
                    const snippet = `{ yaw: ${yaw.toFixed(1)}, pitch: ${pitch.toFixed(1)}, title: '', text: '' }`;
                    calibrationPanel.textContent = `yaw: ${yaw.toFixed(1)}°  pitch: ${pitch.toFixed(1)}°\n${snippet}`;
                    navigator.clipboard?.writeText(snippet).catch(() => {});
                });
            }

            // --- Мышь ---
            document.addEventListener('mousedown', (e) => {
                if (e.button === 0 && !sidebar.classList.contains('open') && !isInteractiveTarget(e.target)) {
                    isDown = true;
                    velocity = { x: 0, y: 0 };
                    previousPosition = { x: e.clientX, y: e.clientY };
                    document.body.classList.add('dragging');
                    resetAutoScroll();
                }
            });

            document.addEventListener('mouseup', () => {
                isDown = false;
                document.body.classList.remove('dragging');
            });

            document.addEventListener('mouseleave', () => {
                isDown = false;
                document.body.classList.remove('dragging');
            });

            document.addEventListener('mousemove', (e) => {
                if (isDown) {
                    const deltaX = e.clientX - previousPosition.x;
                    const deltaY = e.clientY - previousPosition.y;

                    camera.rotation.y += deltaX * sensitivity;
                    camera.rotation.x += deltaY * sensitivity;

                    const maxAngle = Math.PI / 2;
                    camera.rotation.x = Math.max(-maxAngle, Math.min(maxAngle, camera.rotation.x));

                    velocity.x = deltaX * sensitivity;
                    velocity.y = deltaY * sensitivity;

                    previousPosition = { x: e.clientX, y: e.clientY };
                    resetAutoScroll();
                }
            });

            document.addEventListener('wheel', (e) => {
                e.preventDefault();
                const zoomDelta = e.deltaY > 0 ? zoomSensitivity : -zoomSensitivity;
                camera.fov += zoomDelta;
                camera.fov = Math.max(minFOV, Math.min(maxFOV, camera.fov));
                camera.updateProjectionMatrix();
                resetAutoScroll();
            }, { passive: false });

            // --- Сенсорное управление ---
            let lastTouchDistance = 0;
            let lastTapTime = 0;

            document.addEventListener('touchstart', (e) => {
                if (isInteractiveTarget(e.target)) return;

                if (e.touches.length === 1 && !sidebar.classList.contains('open')) {
                    const now = Date.now();
                    if (now - lastTapTime < 300) {
                        // двойное касание — сброс вида
                        lastTapTime = 0;
                        isDown = false;
                        resetView();
                        return;
                    }
                    lastTapTime = now;

                    isDown = true;
                    velocity = { x: 0, y: 0 };
                    const touch = e.touches[0];
                    previousPosition = { x: touch.clientX, y: touch.clientY };
                    document.body.classList.add('dragging');
                    lastTouchDistance = 0;
                    resetAutoScroll();
                } else if (e.touches.length === 2) {
                    isDown = false;
                    lastTouchDistance = getTouchDistance(e.touches[0], e.touches[1]);
                    resetAutoScroll();
                }
            });

            document.addEventListener('touchend', () => {
                isDown = false;
                document.body.classList.remove('dragging');
                lastTouchDistance = 0;
            });

            document.addEventListener('touchmove', (e) => {
                if (e.touches.length === 1 && isDown) {
                    const touch = e.touches[0];
                    const deltaX = touch.clientX - previousPosition.x;
                    const deltaY = touch.clientY - previousPosition.y;

                    camera.rotation.y += deltaX * sensitivity;
                    camera.rotation.x += deltaY * sensitivity;

                    const maxAngle = Math.PI / 2;
                    camera.rotation.x = Math.max(-maxAngle, Math.min(maxAngle, camera.rotation.x));

                    velocity.x = deltaX * sensitivity;
                    velocity.y = deltaY * sensitivity;

                    previousPosition = { x: touch.clientX, y: touch.clientY };
                    e.preventDefault();
                    resetAutoScroll();
                } else if (e.touches.length === 2) {
                    e.preventDefault();
                    const currentDistance = getTouchDistance(e.touches[0], e.touches[1]);
                    if (lastTouchDistance > 0) {
                        const deltaPinch = currentDistance - lastTouchDistance;
                        const zoomDelta = deltaPinch > 0 ? -zoomSensitivity : zoomSensitivity;
                        camera.fov += zoomDelta;
                        camera.fov = Math.max(minFOV, Math.min(maxFOV, camera.fov));
                        camera.updateProjectionMatrix();
                    }
                    lastTouchDistance = currentDistance;
                    resetAutoScroll();
                }
            }, { passive: false });

            function getTouchDistance(touch1, touch2) {
                const dx = touch1.clientX - touch2.clientX;
                const dy = touch1.clientY - touch2.clientY;
                return Math.sqrt(dx * dx + dy * dy);
            }

            // --- Клавиатура ---
            const rotateStep = 0.05;
            document.addEventListener('keydown', (e) => {
                if (sidebar.classList.contains('open')) return;
                let handled = true;
                switch (e.key) {
                    case 'ArrowLeft':
                        camera.rotation.y -= rotateStep;
                        break;
                    case 'ArrowRight':
                        camera.rotation.y += rotateStep;
                        break;
                    case 'ArrowUp':
                        camera.rotation.x = Math.max(-Math.PI / 2, camera.rotation.x - rotateStep);
                        break;
                    case 'ArrowDown':
                        camera.rotation.x = Math.min(Math.PI / 2, camera.rotation.x + rotateStep);
                        break;
                    case '+':
                    case '=':
                        camera.fov = Math.max(minFOV, camera.fov - zoomSensitivity);
                        camera.updateProjectionMatrix();
                        break;
                    case '-':
                    case '_':
                        camera.fov = Math.min(maxFOV, camera.fov + zoomSensitivity);
                        camera.updateProjectionMatrix();
                        break;
                    default:
                        handled = false;
                }
                if (handled) {
                    resetAutoScroll();
                }
            });

            // --- Полноэкранный режим ---
            fullscreenBtn.addEventListener('click', () => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen?.().catch(() => {});
                } else {
                    document.exitFullscreen?.();
                }
            });

            document.addEventListener('fullscreenchange', () => {
                const isFs = !!document.fullscreenElement;
                fullscreenBtn.textContent = isFs ? '⤢' : '⛶';
                fullscreenBtn.setAttribute('aria-label', isFs ? 'Выйти из полноэкранного режима' : 'Полноэкранный режим');
            });

            // Проецирует метки на экран согласно текущему повороту камеры
            const cameraForward = new THREE.Vector3();
            function updateHotspots() {
                if (!hotspotMarkers.length) return;
                camera.getWorldDirection(cameraForward);

                hotspotMarkers.forEach((h) => {
                    const dot = cameraForward.dot(h.dir);
                    if (dot < 0.15) {
                        h.el.classList.add('hidden');
                        h.tooltipEl.classList.remove('visible');
                        h.el.classList.remove('active');
                        return;
                    }
                    const projected = h.dir.clone().multiplyScalar(480).project(camera);
                    const x = (projected.x * 0.5 + 0.5) * window.innerWidth;
                    const y = (-projected.y * 0.5 + 0.5) * window.innerHeight;

                    h.el.classList.remove('hidden');
                    h.el.style.left = x + 'px';
                    h.el.style.top = y + 'px';

                    if (h.tooltipEl.classList.contains('visible')) {
                        const tooltipWidth = 260;
                        let tx = x + 20;
                        if (tx + tooltipWidth > window.innerWidth - 10) {
                            tx = Math.max(10, x - tooltipWidth - 20);
                        }
                        const ty = Math.min(Math.max(y - 20, 10), window.innerHeight - 120);
                        h.tooltipEl.style.left = tx + 'px';
                        h.tooltipEl.style.top = ty + 'px';
                    }
                });
            }

            // --- Цикл рендеринга ---
            function animate() {
                rafId = requestAnimationFrame(animate);

                if (isAutoScrolling && !isDown) {
                    camera.rotation.y += autoScrollSpeed;
                }

                if (!isDown && (Math.abs(velocity.x) > 0.0001 || Math.abs(velocity.y) > 0.0001)) {
                    camera.rotation.y += velocity.x;
                    camera.rotation.x += velocity.y;

                    const maxAngle = Math.PI / 2;
                    camera.rotation.x = Math.max(-maxAngle, Math.min(maxAngle, camera.rotation.x));

                    velocity.x *= friction;
                    velocity.y *= friction;
                }

                renderer.render(scene, camera);
                updateHotspots();
            }
            animate();
            startAutoScrollTimer();

            // Останавливаем рендер во вкладке в фоне, чтобы не тратить ресурсы
            document.addEventListener('visibilitychange', () => {
                if (document.hidden) {
                    if (rafId) cancelAnimationFrame(rafId);
                } else {
                    animate();
                }
            });

            // Debounce на resize
            let resizeTimeout;
            window.addEventListener('resize', () => {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(() => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                }, 100);
            });
        }

        function disposeMesh(m) {
            if (!m) return;
            if (m.geometry) m.geometry.dispose();
            if (m.material) {
                if (m.material.map) m.material.map.dispose();
                m.material.dispose();
            }
        }

        function loadPanorama(imageUrl) {
            const token = ++loadToken;
            showError(false);
            showLoading(true);
            srStatus.textContent = 'Загрузка панорамы…';

            const textureLoader = new THREE.TextureLoader();

            textureLoader.load(
                imageUrl,
                function (texture) {
                    if (token !== loadToken) {
                        // Пользователь уже переключился на другую панораму — эта загрузка устарела
                        texture.dispose();
                        return;
                    }

                    texture.encoding = THREE.sRGBEncoding;
                    texture.minFilter = THREE.LinearFilter;

                    const geometry = new THREE.SphereGeometry(500, 64, 32);
                    geometry.scale(-1, 1, 1);
                    const material = new THREE.MeshBasicMaterial({ map: texture });
                    const newMesh = new THREE.Mesh(geometry, material);

                    // Старая панорама остаётся видимой до полной загрузки новой
                    const oldMesh = mesh;
                    scene.add(newMesh);
                    mesh = newMesh;
                    if (oldMesh) {
                        scene.remove(oldMesh);
                        disposeMesh(oldMesh);
                    }

                    showLoading(false);
                    srStatus.textContent = 'Панорама загружена';
                },
                undefined,
                function (error) {
                    if (token !== loadToken) return;
                    console.error('Ошибка загрузки панорамы:', imageUrl, error);
                    showLoading(false);
                    showError(true);
                    srStatus.textContent = 'Не удалось загрузить панораму';
                }
            );
        }

        function checkTHREE() {
            if (typeof THREE !== 'undefined') {
                initThreeJS();
            } else {
                setTimeout(checkTHREE, 100);
            }
        }

        checkTHREE();
    </script>
</body>
</html>
